# DigitalOcean App Platform spec.
#
# Create:   doctl apps create --spec .do/app.yaml
# Update:   doctl apps update <APP_ID> --spec .do/app.yaml
# Destroy:  doctl apps delete <APP_ID>
#
# IMPORTANT: After the app is created, set the SECRET env vars below in the
# DO control panel (Settings → App-level environment variables). They're left
# blank in this file on purpose — never commit secrets.

name: solar-dashboard
region: sgp        # Singapore — closest DO region to Sri Lanka

services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      # Replace <YOUR-GH-USERNAME> with your GitHub login after first push.
      # Or use `doctl apps create --spec .do/app.yaml` after editing this in.
      repo: ichiro2000/solar-dashboard
      branch: main
      deploy_on_push: true

    instance_size_slug: basic-xxs   # ~$5/month, smallest tier
    instance_count: 1
    http_port: 3000

    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    routes:
      - path: /

    # Non-secret env. Secrets (SEMS_PASSWORD, NEXTAUTH_SECRET, etc.) MUST be
    # added separately as encrypted variables in the DO control panel.
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: DATA_SOURCE
        scope: RUN_TIME
        value: sems
      - key: SEMS_REGION
        scope: RUN_TIME
        value: hk
      - key: SEMS_BATTERY_SIGN
        scope: RUN_TIME
        value: auto
      - key: SEMS_GRID_SIGN
        scope: RUN_TIME
        value: auto
      - key: ENABLE_SAMPLER
        scope: RUN_TIME
        value: "true"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: info
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: ${APP_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # The following are stored as SECRET — fill them in via the DO control
      # panel OR run:
      #   doctl apps update <APP_ID> --spec - <<< "$(envsubst < .do/app.yaml)"
      # after `export SEMS_ACCOUNT=...` etc.
      - key: SEMS_ACCOUNT
        scope: RUN_TIME
        type: SECRET
      - key: SEMS_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: NEXTAUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SESSION_ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DASHBOARD_PASSWORD_HASH
        scope: RUN_TIME
        type: SECRET

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database   # ~$7/month dev tier; bump to db-s-1vcpu-1gb for prod
    num_nodes: 1
    production: false
